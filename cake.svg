<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" fill="none">
  <!-- Plate -->
  <ellipse cx="60" cy="115" rx="52" ry="10" fill="#F5E6D0" stroke="#D4BA82" stroke-width="1.2"/>
  <ellipse cx="60" cy="113" rx="48" ry="8" fill="#FFF6E6" opacity="0.5"/>

  <!-- Bottom layer -->
  <rect x="18" y="82" width="84" height="30" rx="6" fill="#F5E6CC" stroke="#D4BA82" stroke-width="1.2"/>
  <ellipse cx="60" cy="82" rx="42" ry="6" fill="#F5E6CC" stroke="#D4BA82" stroke-width="1.2"/>

  <!-- Frosting between layers -->
  <ellipse cx="60" cy="82" rx="42" ry="5" fill="#f7a8a4" opacity="0.7"/>
  <path d="M18 85 C22 89 26 85 30 88 C34 91 38 86 42 89 C46 92 50 87 54 90 C58 93 62 88 66 91 C70 94 74 89 78 92 C82 95 86 90 90 93 C94 90 98 92 102 88" stroke="#f7a8a4" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Top layer -->
  <rect x="26" y="52" width="68" height="30" rx="5" fill="#F0DFBE" stroke="#D4BA82" stroke-width="1.2"/>
  <ellipse cx="60" cy="52" rx="34" ry="5" fill="#F0DFBE" stroke="#D4BA82" stroke-width="1.2"/>

  <!-- Top frosting -->
  <ellipse cx="60" cy="52" rx="34" ry="5" fill="#f7a8a4" opacity="0.8"/>
  <path d="M26 55 C30 59 34 54 38 58 C42 62 46 56 50 60 C54 64 58 58 62 62 C66 66 70 60 74 64 C78 68 82 62 86 66 C90 62 94 64 94 58" stroke="#f7a8a4" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Drip details -->
  <path d="M30 52 C30 52 28 62 30 66" stroke="#f7a8a4" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M60 52 C60 52 60 64 60 68" stroke="#f7a8a4" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M88 52 C88 52 90 60 88 64" stroke="#f7a8a4" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Sprinkles on top -->
  <rect x="38" y="46" width="5" height="2" rx="1" fill="#74c69d" transform="rotate(25 40 47)"/>
  <rect x="50" y="44" width="5" height="2" rx="1" fill="#5BA3E6" transform="rotate(-15 52 45)"/>
  <rect x="62" y="45" width="5" height="2" rx="1" fill="#FBDB68" transform="rotate(40 64 46)"/>
  <rect x="74" y="47" width="5" height="2" rx="1" fill="#e63946" transform="rotate(-30 76 48)"/>
  <rect x="44" y="50" width="4" height="2" rx="1" fill="#5BA3E6" transform="rotate(60 46 51)"/>
  <rect x="68" y="49" width="4" height="2" rx="1" fill="#74c69d" transform="rotate(-50 70 50)"/>

  <!-- Candle -->
  <rect x="57" y="28" width="6" height="22" rx="2" fill="#5BA3E6" stroke="#4080C0" stroke-width="0.8"/>
  <rect x="58.5" y="28" width="2" height="22" rx="1" fill="#7BC0F0" opacity="0.4"/>
  <!-- Candle stripe -->
  <line x1="57" y1="35" x2="63" y2="35" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="57" y1="40" x2="63" y2="40" stroke="white" stroke-width="0.8" opacity="0.3"/>

  <!-- Flame -->
  <ellipse cx="60" cy="24" rx="4" ry="6" fill="#FBDB68" opacity="0.9"/>
  <ellipse cx="60" cy="23" rx="2.5" ry="4" fill="#FFF3B0" opacity="0.8"/>
  <ellipse cx="60" cy="22" rx="1.2" ry="2" fill="white" opacity="0.6"/>

  <!-- Shine on cake -->
  <ellipse cx="42" cy="65" rx="5" ry="8" fill="white" opacity="0.06" transform="rotate(-15 42 65)"/>
</svg>