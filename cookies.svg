<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 110" fill="none">
  <defs>
    <radialGradient id="cookieGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#DEAC64"/>
      <stop offset="30%" stop-color="#D49E4E"/>
      <stop offset="70%" stop-color="#C4863A"/>
      <stop offset="100%" stop-color="#A06B28"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="60" cy="90" rx="36" ry="8" fill="#C4A86C" opacity="0.15"/>

  <!-- Main cookie -->
  <circle cx="60" cy="52" r="36" fill="url(#cookieGrad)" stroke="#B07A24" stroke-width="1.5"/>

  <!-- Cookie edge detail -->
  <circle cx="60" cy="52" r="34" fill="none" stroke="#C4863A" stroke-width="1" opacity="0.4"/>

  <!-- Slightly irregular edge bumps -->
  <circle cx="28" cy="45" r="4" fill="#C4863A" opacity="0.3"/>
  <circle cx="35" cy="28" r="3.5" fill="#C4863A" opacity="0.25"/>
  <circle cx="60" cy="18" r="3" fill="#C4863A" opacity="0.22"/>
  <circle cx="82" cy="30" r="3.5" fill="#C4863A" opacity="0.25"/>
  <circle cx="93" cy="50" r="3.5" fill="#C4863A" opacity="0.28"/>
  <circle cx="88" cy="72" r="3" fill="#C4863A" opacity="0.22"/>
  <circle cx="30" cy="70" r="3.5" fill="#C4863A" opacity="0.25"/>

  <!-- Chocolate chips - top surfaces (dark) -->
  <ellipse cx="42" cy="38" rx="5" ry="4" fill="#3E1C0A" transform="rotate(-15 42 38)"/>
  <ellipse cx="70" cy="34" rx="5.5" ry="4" fill="#4A2512" transform="rotate(20 70 34)"/>
  <ellipse cx="54" cy="58" rx="5" ry="3.5" fill="#3E1C0A" transform="rotate(-10 54 58)"/>
  <ellipse cx="78" cy="56" rx="4.5" ry="3.5" fill="#4A2512" transform="rotate(25 78 56)"/>
  <ellipse cx="36" cy="60" rx="4.5" ry="3.5" fill="#3E1C0A" transform="rotate(-20 36 60)"/>
  <ellipse cx="60" cy="42" rx="5" ry="4" fill="#4A2512" transform="rotate(10 60 42)"/>
  <ellipse cx="50" cy="72" rx="4" ry="3" fill="#3E1C0A" transform="rotate(5 50 72)"/>
  <ellipse cx="72" cy="70" rx="4.5" ry="3" fill="#4A2512" transform="rotate(-15 72 70)"/>

  <!-- Chocolate chip highlights -->
  <ellipse cx="41" cy="36.5" rx="2" ry="1.2" fill="#6B3E1C" opacity="0.5" transform="rotate(-15 41 36.5)"/>
  <ellipse cx="69" cy="32.5" rx="2.2" ry="1.2" fill="#6B3E1C" opacity="0.5" transform="rotate(20 69 32.5)"/>
  <ellipse cx="53" cy="56.5" rx="2" ry="1" fill="#6B3E1C" opacity="0.45" transform="rotate(-10 53 56.5)"/>
  <ellipse cx="77" cy="54.5" rx="1.8" ry="1" fill="#6B3E1C" opacity="0.45" transform="rotate(25 77 54.5)"/>
  <ellipse cx="59" cy="40.5" rx="2" ry="1.2" fill="#6B3E1C" opacity="0.5" transform="rotate(10 59 40.5)"/>

  <!-- Melted chocolate chip edges (slight spread) -->
  <ellipse cx="42" cy="40" rx="5.5" ry="1.5" fill="#3E1C0A" opacity="0.15" transform="rotate(-15 42 40)"/>
  <ellipse cx="70" cy="36" rx="6" ry="1.5" fill="#4A2512" opacity="0.12" transform="rotate(20 70 36)"/>
  <ellipse cx="54" cy="59.5" rx="5.5" ry="1.2" fill="#3E1C0A" opacity="0.12" transform="rotate(-10 54 59.5)"/>

  <!-- Cracks around chips -->
  <path d="M47 38 L49 36" stroke="#A06B28" stroke-width="0.5" opacity="0.3"/>
  <path d="M37 38 L35 36" stroke="#A06B28" stroke-width="0.5" opacity="0.3"/>
  <path d="M75 34 L77 32" stroke="#A06B28" stroke-width="0.5" opacity="0.3"/>
  <path d="M58 58 L60 60" stroke="#A06B28" stroke-width="0.5" opacity="0.3"/>

  <!-- Golden brown spots (baked texture) -->
  <circle cx="48" cy="46" r="1.5" fill="#A06B28" opacity="0.25"/>
  <circle cx="65" cy="48" r="1.2" fill="#A06B28" opacity="0.2"/>
  <circle cx="44" cy="52" r="1" fill="#A06B28" opacity="0.18"/>
  <circle cx="82" cy="44" r="1.2" fill="#A06B28" opacity="0.2"/>
  <circle cx="34" cy="48" r="1" fill="#A06B28" opacity="0.18"/>

  <!-- Shine/highlight -->
  <ellipse cx="50" cy="42" rx="8" ry="10" fill="white" opacity="0.07" transform="rotate(-15 50 42)"/>
</svg>