<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" fill="none">
  <!-- Stick -->
  <rect x="45" y="72" width="10" height="55" rx="5" fill="#8B5E3C" stroke="#6B3E1C" stroke-width="1"/>
  <rect x="47" y="72" width="3" height="55" rx="1.5" fill="#A0724D" opacity="0.5"/>

  <!-- Cake ball (sphere) -->
  <circle cx="50" cy="42" r="32" fill="#f7a8a4"/>
  <circle cx="50" cy="42" r="32" fill="url(#cakeGrad)"/>

  <!-- Chocolate coating (top half dip) -->
  <path d="M18 42 C18 20 30 10 50 10 C70 10 82 20 82 42 C82 42 75 50 50 50 C25 50 18 42 18 42Z" fill="#5C2E0E"/>
  <path d="M22 42 C22 24 32 14 50 14 C68 14 78 24 78 42 C78 42 72 48 50 48 C28 48 22 42 22 42Z" fill="#7A3B15"/>
  <path d="M28 42 C28 28 36 18 50 18 C64 18 72 28 72 42 C72 42 67 46 50 46 C33 46 28 42 28 42Z" fill="#8B4D1E" opacity="0.6"/>

  <!-- Chocolate drip details -->
  <path d="M30 42 C30 42 28 52 30 56" stroke="#5C2E0E" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M50 42 C50 42 50 55 50 58" stroke="#5C2E0E" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M70 42 C70 42 72 50 71 54" stroke="#5C2E0E" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Sprinkles -->
  <rect x="32" y="24" width="5" height="2" rx="1" fill="#74c69d" transform="rotate(25 34 25)"/>
  <rect x="42" y="20" width="5" height="2" rx="1" fill="#5BA3E6" transform="rotate(-15 44 21)"/>
  <rect x="55" y="22" width="5" height="2" rx="1" fill="#e63946" transform="rotate(40 57 23)"/>
  <rect x="62" y="28" width="5" height="2" rx="1" fill="#74c69d" transform="rotate(-30 64 29)"/>
  <rect x="36" y="30" width="5" height="2" rx="1" fill="#5BA3E6" transform="rotate(60 38 31)"/>
  <rect x="48" y="26" width="4" height="2" rx="1" fill="#FBDB68" transform="rotate(10 50 27)"/>
  <rect x="58" y="34" width="4" height="2" rx="1" fill="#e63946" transform="rotate(-50 60 35)"/>
  <rect x="40" y="34" width="4" height="2" rx="1" fill="#FBDB68" transform="rotate(35 42 35)"/>

  <!-- Cute face - eyes -->
  <ellipse cx="40" cy="40" rx="3.5" ry="4" fill="#2c2523"/>
  <ellipse cx="60" cy="40" rx="3.5" ry="4" fill="#2c2523"/>
  <!-- Eye highlights -->
  <circle cx="41.5" cy="38.5" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="61.5" cy="38.5" r="1.2" fill="white" opacity="0.8"/>
  <!-- Cute smile -->
  <path d="M44 47 Q50 52 56 47" stroke="#2c2523" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Rosy cheeks -->
  <ellipse cx="34" cy="46" rx="4" ry="2.5" fill="#e63946" opacity="0.25"/>
  <ellipse cx="66" cy="46" rx="4" ry="2.5" fill="#e63946" opacity="0.25"/>

  <!-- Shine on cake ball -->
  <ellipse cx="38" cy="32" rx="6" ry="8" fill="white" opacity="0.12" transform="rotate(-20 38 32)"/>

  <defs>
    <radialGradient id="cakeGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.05"/>
    </radialGradient>
  </defs>
</svg>
