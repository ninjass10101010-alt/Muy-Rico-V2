  <path d="M110,85 C135,82 165,80 182,85" stroke="#3d5a3a" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M110,110 C135,108 162,110 180,118" stroke="#3d5a3a" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M110,135 C130,135 155,138 172,145" stroke="#3d5a3a" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Fenestrations (holes) - characteristic monstera feature -->
