<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>New Order — Muy Rico</title>
<style>
  :root { --orange:#E85D04; --dark:#1A1A2E; --gray:#6B7280; --bg:#FAFAF9; --line:#E5E7EB; }
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--dark);margin:0;padding:24px;max-width:680px;margin:auto}
  h1{color:var(--orange);margin:0 0 4px;font-size:28px}
  .sub{color:var(--gray);margin:0 0 24px;font-size:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:16px}
  label{display:block;font-weight:600;font-size:13px;margin-bottom:6px;color:var(--dark)}
  input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:15px;font-family:inherit;background:#fff}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,93,4,.12)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .full{grid-column:1 / -1}
  .items{display:grid;grid-template-columns:2fr 80px 100px 32px;gap:8px;align-items:center;margin-bottom:8px}
  .items input{margin:0}
  .items .x{background:none;border:none;color:var(--gray);font-size:20px;cursor:pointer;padding:0}
  .add{background:none;border:1px dashed var(--line);color:var(--gray);padding:10px;border-radius:8px;width:100%;cursor:pointer;font-size:14px}
  .add:hover{border-color:var(--orange);color:var(--orange)}
  .pay-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .pay-grid label{display:flex;align-items:center;justify-content:center;padding:12px;border:1px solid var(--line);border-radius:8px;cursor:pointer;font-weight:500;font-size:14px;text-align:center;margin:0}
  .pay-grid input{position:absolute;opacity:0;pointer-events:none}
  .pay-grid input:checked + span{color:#fff}
  .pay-grid label:has(input:checked){background:var(--orange);border-color:var(--orange);color:#fff}
  .save{background:var(--orange);color:#fff;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
  .save:hover{background:#C84E03}
  .save:disabled{opacity:.5;cursor:not-allowed}
  .ok{background:#DCFCE7;border:1px solid #86EFAC;color:#166534;padding:12px;border-radius:8px;margin-bottom:16px;display:none}
  .ok a{color:#166534;font-weight:600}
  .err{background:#FEE2E2;border:1px solid #FCA5A5;color:#991B1B;padding:12px;border-radius:8px;margin-bottom:16px;display:none}
  .back{color:var(--gray);font-size:13px;text-decoration:none;display:inline-block;margin-bottom:12px}
  .back:hover{color:var(--orange)}
</style>
</head>
<body>
  <a href="/dashboard" class="back">← Dashboard</a>
  <h1>🥟 New Order</h1>
  <p class="sub">Internal order entry — Muy Rico</p>

  <div id="ok" class="ok"></div>
  <div id="err" class="err"></div>

  <form id="f">
    <div class="card">
      <label>Customer name *</label>
      <input name="customer_name" required autocomplete="off" />

      <div class="row" style="margin-top:12px">
        <div>
          <label>Phone</label>
          <input name="phone" type="tel" autocomplete="off" />
        </div>
        <div>
          <label>Pickup date *</label>
          <input name="pickup_date" type="date" required />
        </div>
      </div>
      <div class="row" style="margin-top:12px">
        <div>
          <label>Pickup time</label>
          <input name="pickup_time" type="time" />
        </div>
        <div></div>
      </div>
    </div>

    <div class="card">
      <label>Items *</label>
      <div id="items">
        <div class="items">
          <input placeholder="Item name" class="i-name" />
          <input type="number" min="1" value="1" class="i-qty" />
          <input type="number" min="0" step="0.01" placeholder="Price" class="i-price" />
          <button type="button" class="x" onclick="this.parentNode.remove();updateTotal()" title="Remove">×</button>
        </div>
      </div>
      <button type="button" class="add" onclick="addItem()">+ Add item</button>
      <div style="margin-top:12px;text-align:right;font-size:18px;font-weight:600">
        Total: $<span id="total">0.00</span>
      </div>
    </div>

    <div class="card">
      <label>Payment *</label>
      <div class="pay-grid">
        <label><input type="radio" name="payment_method" value="venmo" required /><span>Venmo</span></label>
        <label><input type="radio" name="payment_method" value="cashapp" /><span>Cash App</span></label>
        <label><input type="radio" name="payment_method" value="applepay" /><span>Apple Pay</span></label>
        <label><input type="radio" name="payment_method" value="cash" /><span>Cash</span></label>
      </div>
      <div style="margin-top:12px">
        <label>Payment status</label>
        <select name="payment_status">
          <option value="unpaid">Unpaid</option>
          <option value="paid">Paid</option>
        </select>
      </div>
    </div>

    <div class="card">
      <label>Order status</label>
      <select name="status">
        <option value="pending">Pending</option>
        <option value="ready">Ready for pickup</option>
        <option value="done">Done</option>
      </select>
      <div style="margin-top:12px">
        <label>Notes</label>
        <textarea name="notes" rows="3" placeholder="Any special instructions..."></textarea>
      </div>
    </div>

    <button type="submit" class="save" id="saveBtn">Save Order</button>
  </form>

<script>
const API = '/api/orders';
function addItem(name='',qty=1,price='') {
  const div = document.createElement('div');
  div.className = 'items';
  div.innerHTML = `
    <input placeholder="Item name" class="i-name" value="${name}" />
    <input type="number" min="1" value="${qty}" class="i-qty" />
    <input type="number" min="0" step="0.01" placeholder="Price" class="i-price" value="${price}" />
    <button type="button" class="x" onclick="this.parentNode.remove();updateTotal()" title="Remove">×</button>
  `;
  div.querySelectorAll('.i-qty,.i-price').forEach(el => el.addEventListener('input', updateTotal));
  document.getElementById('items').appendChild(div);
}
function updateTotal() {
  let t = 0;
  document.querySelectorAll('.items').forEach(row => {
    const q = Number(row.querySelector('.i-qty').value) || 0;
    const p = Number(row.querySelector('.i-price').value) || 0;
    t += q * p;
  });
  document.getElementById('total').textContent = t.toFixed(2);
}
function gatherItems() {
  const arr = [];
  document.querySelectorAll('.items').forEach(row => {
    const name = row.querySelector('.i-name').value.trim();
    const qty  = Number(row.querySelector('.i-qty').value) || 0;
    const price= Number(row.querySelector('.i-price').value) || 0;
    if (name) arr.push({ name, qty, price });
  });
  return arr;
}
document.querySelectorAll('.i-qty,.i-price').forEach(el => el.addEventListener('input', updateTotal));

// Default pickup date = today
document.querySelector('input[name="pickup_date"]').valueAsDate = new Date();

document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const f = e.target;
  const items = gatherItems();
  if (!items.length) { showErr('Add at least one item.'); return; }
  const data = {
    customer_name: f.customer_name.value,
    phone: f.phone.value || null,
    pickup_date: f.pickup_date.value,
    pickup_time: f.pickup_time.value || null,
    items_json: items,
    total_cents: Math.round(items.reduce((s,i) => s + (i.qty*i.price), 0) * 100),
    payment_method: f.payment_method.value,
    payment_status: f.payment_status.value,
    status: f.status.value,
    notes: f.notes.value || null,
  };
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const r = await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'Save failed');
    showOk(`Order #${j.id} saved. <a href="/dashboard">Go to dashboard →</a>`);
    f.reset();
    document.getElementById('items').innerHTML = '';
    addItem();
    document.querySelector('input[name="pickup_date"]').valueAsDate = new Date();
    updateTotal();
    window.scrollTo(0,0);
  } catch (e) {
    showErr(e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Save Order';
  }
});
function showOk(html) { const e=document.getElementById('ok'); e.innerHTML=html; e.style.display='block'; document.getElementById('err').style.display='none'; }
function showErr(msg) { const e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; document.getElementById('ok').style.display='none'; }
</script>
</body>
</html>
